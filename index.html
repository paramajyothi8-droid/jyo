<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = "https://jopcbkfxgbnstflualez.supabase.co";

const SUPABASE_ANON_KEY = "sb_publishable_7CW_R5hqXurJ5bZdeifHzA_e4nlhXDn";

/* ========================= */

const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

/* SHOW LOGIN */

function showLogin(){

document.getElementById("signupPage").style.display="none";

document.getElementById("loginPage").style.display="block";

}

/* SHOW SIGNUP */

function showSignup(){

document.getElementById("loginPage").style.display="none";

document.getElementById("signupPage").style.display="block";

}

/* SIGNUP */

async function signup(){

const name = document.getElementById("signupName").value.trim();

const email = document.getElementById("signupEmail").value.trim();

const password = document.getElementById("signupPassword").value.trim();

const mobile = document.getElementById("signupMobile").value.trim();

if(name==="" || email==="" || password==="" || mobile===""){

alert("Fill All Fields");

return;

}

/* CHECK USER */

const { data: existingUser } = await client
.from("users")
.select("*")
.eq("email",email);

if(existingUser && existingUser.length > 0){

alert("Account Already Exists");

return;

}

/* INSERT USER */

const { error } = await client
.from("users")
.insert([
{
full_name:name,
email:email,
password:password,
mobile:mobile
}
]);

if(!error){

alert("Signup Successful");

showLogin();

}else{

alert("Signup Failed");

}

}

/* LOGIN */

async function login(){

const email = document.getElementById("loginEmail").value.trim();

const password = document.getElementById("loginPassword").value.trim();

if(email==="" || password===""){

alert("Enter Email & Password");

return;

}

/* CHECK LOGIN */

const { data } = await client
.from("users")
.select("*")
.eq("email",email)
.eq("password",password);

if(data && data.length > 0){

document.getElementById("loginPage").style.display="none";

document.getElementById("signupPage").style.display="none";

document.getElementById("detailsPage").style.display="block";

}else{

alert("Invalid Email Or Password");

}

}

/* USER POPUP */

function toggleUser(){

let popup=document.getElementById("popup");

if(popup.style.display==="block"){
popup.style.display="none";
}else{
popup.style.display="block";
}

}

/* LOGOUT */

function logout(){

document.getElementById("detailsPage").style.display="none";

document.getElementById("loginPage").style.display="block";

}

/* PRODUCT PAGE */

function openProduct(title,price,image,d1,d2,d3,d4){

document.getElementById("detailsPage").style.display="none";

document.getElementById("productPage").style.display="block";

document.getElementById("productTitle").innerHTML=title;

document.getElementById("productPrice").innerHTML=price;

document.getElementById("productImage").src=image;

document.getElementById("d1").innerHTML="• "+d1;

document.getElementById("d2").innerHTML="• "+d2;

document.getElementById("d3").innerHTML="• "+d3;

document.getElementById("d4").innerHTML="• "+d4;

}

/* BACK */

function backHome(){

document.getElementById("productPage").style.display="none";

document.getElementById("detailsPage").style.display="block";

}

/* SLIDE MOVE */

const slider=document.getElementById("slider");

let isDown=false;

let startX;

let scrollLeft;

slider.addEventListener("mousedown",(e)=>{

isDown=true;

startX=e.pageX-slider.offsetLeft;

scrollLeft=slider.scrollLeft;

});

slider.addEventListener("mouseleave",()=>{

isDown=false;

});

slider.addEventListener("mouseup",()=>{

isDown=false;

});

slider.addEventListener("mousemove",(e)=>{

if(!isDown) return;

e.preventDefault();

const x=e.pageX-slider.offsetLeft;

const walk=(x-startX)*2;

slider.scrollLeft=scrollLeft-walk;

});

</script>
